{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <div class="card shadow-sm">
    <div class="card-header bg-success text-white">
      <h4 class="mb-0">AI Grievance Redressal Chatbot</h4>
    </div>
    <div class="card-body" style="height: 500px; overflow-y: auto;" id="chatWindow">
      <!-- Chat messages will appear here -->
    </div>
    <div class="card-footer">
      <form id="chatForm" class="d-flex">
        <input type="text" id="chatInput" class="form-control me-2" placeholder="Ask about PM-Kisan, Ration Card, Pension..." required>
        <button type="submit" class="btn btn-primary">Send</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const chatWindow = document.getElementById("chatWindow");
const chatForm = document.getElementById("chatForm");
const chatInput = document.getElementById("chatInput");

function appendMessage(sender, text) {
  const div = document.createElement("div");
  div.classList.add("mb-2");
  div.innerHTML = `<strong>${sender}:</strong> ${text}`;
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

chatForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const userMsg = chatInput.value;
  appendMessage("You", userMsg);
  chatInput.value = "";

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ query: userMsg, language: "hi" }) // you can change "hi"/"te"/"en"
    });
    const data = await res.json();
    if (data.answer) {
      appendMessage("AI", data.answer);
    } else {
      appendMessage("AI", "❌ Sorry, I couldn’t process that.");
    }
  } catch (err) {
    console.error(err);
    appendMessage("AI", "⚠️ Error contacting server.");
  }
});
</script>
{% endblock %}
